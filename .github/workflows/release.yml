name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.0.1"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  package:
    name: Package macOS release
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          uname -m

      - name: Install check dependencies
        run: brew list ripgrep >/dev/null 2>&1 || brew install ripgrep

      - name: Run production target checks
        run: scripts/check-production-targets.sh

      - name: Prepare signing and notarization credentials
        env:
          CERTIFICATE_BASE64: ${{ secrets.ARTISAN_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.ARTISAN_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          NOTARY_API_KEY_BASE64: ${{ secrets.ARTISAN_NOTARY_API_KEY_BASE64 }}
          NOTARY_API_KEY_ID: ${{ secrets.ARTISAN_NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.ARTISAN_NOTARY_API_ISSUER_ID }}
        run: |
          require_secret() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              echo "Missing required GitHub Secret: $name" >&2
              exit 1
            fi
          }

          require_secret ARTISAN_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 "$CERTIFICATE_BASE64"
          require_secret ARTISAN_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD "$CERTIFICATE_PASSWORD"
          require_secret ARTISAN_NOTARY_API_KEY_BASE64 "$NOTARY_API_KEY_BASE64"
          require_secret ARTISAN_NOTARY_API_KEY_ID "$NOTARY_API_KEY_ID"
          require_secret ARTISAN_NOTARY_API_ISSUER_ID "$NOTARY_API_ISSUER_ID"

          keychain_path="$RUNNER_TEMP/artisan-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          notary_key_path="$RUNNER_TEMP/AuthKey_${NOTARY_API_KEY_ID}.p8"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode >"$certificate_path"
          printf '%s' "$NOTARY_API_KEY_BASE64" | base64 --decode >"$notary_key_path"
          chmod 600 "$certificate_path" "$notary_key_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security find-identity -p codesigning -v "$keychain_path"

          xcrun notarytool store-credentials artisan-ci \
            --key "$notary_key_path" \
            --key-id "$NOTARY_API_KEY_ID" \
            --issuer "$NOTARY_API_ISSUER_ID" \
            --keychain "$keychain_path" \
            --validate

          {
            echo "ARTISAN_CODESIGN_IDENTITY=Developer ID Application: Noah Czelusta (6JDUNV2R99)"
            echo "ARTISAN_NOTARY_KEYCHAIN_PROFILE=artisan-ci"
            echo "ARTISAN_NOTARY_KEYCHAIN=$keychain_path"
          } >>"$GITHUB_ENV"

      - name: Package release
        env:
          ARTISAN_DIST_DIR: ${{ github.workspace }}/dist
          ARTISAN_RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/package-release.sh "${{ steps.version.outputs.version }}"

      - name: Validate signed release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          stage_dir="$(find dist/stage -maxdepth 1 -type d -name "Artisan-v${VERSION}-macos-*" | head -n 1)"
          if [[ -z "$stage_dir" ]]; then
            echo "Could not find staged release directory" >&2
            exit 1
          fi

          app="$stage_dir/Artisan.app"
          cli="$stage_dir/artisan"

          codesign --verify --deep --strict --verbose=2 "$app"
          codesign --verify --strict --verbose=2 "$cli"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artisan-release-${{ steps.version.outputs.version }}
          path: |
            dist/Artisan-v${{ steps.version.outputs.version }}-macos-*.zip
            dist/Artisan-v${{ steps.version.outputs.version }}-macos-*.zip.sha256
            dist/artisan.rb

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/Artisan-v${{ steps.version.outputs.version }}-macos-*.zip \
            dist/Artisan-v${{ steps.version.outputs.version }}-macos-*.zip.sha256 \
            dist/artisan.rb \
            --verify-tag \
            --generate-notes

      - name: Open same-repo Homebrew cask PR
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cp dist/artisan.rb /tmp/artisan.rb
          branch="release/v${VERSION}-homebrew-cask"
          title="Update Homebrew cask for v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main:refs/remotes/origin/main
          git checkout -B "$branch" origin/main

          mkdir -p Casks
          cp /tmp/artisan.rb Casks/artisan.rb

          if [[ -z "$(git status --porcelain Casks/artisan.rb)" ]]; then
            echo "Casks/artisan.rb already up to date"
            exit 0
          fi

          git add Casks/artisan.rb
          git commit -m "$title"
          git push --force-with-lease origin "$branch"

          body="$(cat <<BODY
          Updates the same-repo Homebrew cask for \`$GITHUB_REF_NAME\`.

          Release: https://github.com/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME

          This PR is opened by the release workflow so protected \`main\` can require PRs while keeping the cask update auditable.
          BODY
          )"

          if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body "$body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$branch" \
              --title "$title" \
              --body "$body"
          fi

      - name: Delete temporary signing keychain
        if: always()
        run: |
          if [[ -n "${ARTISAN_NOTARY_KEYCHAIN:-}" && -f "$ARTISAN_NOTARY_KEYCHAIN" ]]; then
            security delete-keychain "$ARTISAN_NOTARY_KEYCHAIN" || true
          fi
